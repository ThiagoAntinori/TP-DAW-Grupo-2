<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProdeMaster Testing - Formulario de Privilegio</title>
    <link rel="stylesheet" href="../../Assets/CSS/main.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        .form-group input:focus {
            border-color: #0284c7;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        .alert-error {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <header class="content-header" style="margin-bottom: 24px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">
            <h1 id="form-title">Crear Nuevo Privilegio</h1>
            <p class="date-text" id="form-subtitle">Defina un nuevo permiso operativo para el sistema</p>
        </header>

        <div id="form-error" class="alert-error"></div>

        <form id="formPrivilegio">
            <div class="form-group">
                <label for="txtDescription">Descripción del Privilegio</label>
                <input type="text" id="txtDescription" required placeholder="Ej: PARTICIPAR_PRODE">
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="location.href='index.html'">Cancelar</button>
                <button type="submit" class="btn btn-success" id="btnGuardar">Guardar Privilegio</button>
            </div>
        </form>
    </div>

    <script src="../../Assets/JS/auth.js"></script>
    <script src="../../Assets/JS/privilegios.js"></script>
</body>
</html>
