<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProdeMaster - Formulario Equipo</title>
    <link rel="stylesheet" href="../../Assets/CSS/main.css">
</head>
<body>
    <div class="form-container">
        <header class="content-header" style="margin-bottom: 24px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">
            <h1 id="form-title">Crear Nuevo Equipo</h1>
            <p class="date-text" id="form-subtitle">Complete los datos institucionales del club</p>
        </header>
        <div id="form-error" class="alert-error" style="background-color: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; padding: 12px; border-radius: 6px; margin-bottom: 20px; display: none;"></div>
        <form id="formEquipo">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Nombre del Equipo</label>
                <input type="text" id="txtNombre" required placeholder="Ej: Boca Juniors" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Abreviatura (3 letras)</label>
                <input type="text" id="txtAbreviatura" required maxlength="3" placeholder="Ej: BOC" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">URL del Escudo (Imagen)</label>
                <input type="text" id="txtEscudoUrl" placeholder="Ej: https://link.com/escudo.png" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
            </div>
            <div class="form-actions" style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 30px;">
                <button type="button" class="btn btn-secondary" onclick="location.href='index.html'">Cancelar</button>
                <button type="submit" class="btn btn-success">Guardar Equipo</button>
            </div>
        </form>
    </div>
    <script src="../../Assets/JS/auth.js"></script>
    <script src="../../Assets/JS/equipos.js"></script>
</body>
</html>
