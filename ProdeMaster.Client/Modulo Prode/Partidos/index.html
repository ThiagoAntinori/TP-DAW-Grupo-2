<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProdeMaster - Fixture</title>
    <link rel="stylesheet" href="../../Assets/CSS/main.css">
</head>
<body>
    <div class="testing-container">
        <a href="../../index.html" class="nav-back">← Volver al Panel Principal</a>

            <h1>Gestión de Partidos (Fixture)</h1>
            <p class="date-text">Programación de partidos y carga de resultados oficiales</p>
        </header>
        <section class="action-bar">
            <div style="flex:1;"></div>
            <a href="form.html" class="btn btn-success">+ Programar Partido</a>

            <table class="data-table" id="tblMatches">

                        <th>Partido</th>
                        <th>Resultado Real</th>
                        <th>Estado</th>

                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="text-align:center; color:#64748b;">Cargando calendario desde el servidor...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
    <script src="../../Assets/JS/auth.js"></script>
    <script src="../../Assets/JS/partidos.js"></script>
