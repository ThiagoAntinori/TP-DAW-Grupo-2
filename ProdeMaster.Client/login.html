<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODEMASTER- Login</title>
    <link rel="stylesheet" href="Assets/CSS/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">

            <h1>PRODEMASTER</h1>
            <p class="subtitle">Sistema de Pronósticos Deportivos</p>

            <div id="api-error" class="alert-danger"></div>

            <form id="loginForm">

                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingrese su usuario" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                </div>

                <button type="submit">
                    Ingresar
                </button>

            </form>

            <div class="footer">
                Desarrollo y Arquitecturas Web
            </div>

        </div>
    </div>

    <script src="Assets/JS/auth.js"></script>
</body>
</html>
